<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>Shortify — Smart URL Shortener</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Shortify is a fast, secure, and analytics-powered URL shortener. Create short links, track clicks, and manage your URLs easily."
    />
    <meta name="author" content="Shortify" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Shortify - Smart URL Shortener" />
    <meta
      property="og:description"
      content="Create short URLs, track clicks, and manage links with ease using Shortify."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com" />
    <meta
      property="og:image"
      content="https://your-domain.com/og-image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shortify — Smart URL Shortener" />
    <meta
      name="twitter:description"
      content="Shorten links, track performance, and manage URLs effortlessly."
    />
    <meta
      name="twitter:image"
      content="https://your-domain.com/og-image.png"
    />

    <!-- Favicon (optional but recommended) -->
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
